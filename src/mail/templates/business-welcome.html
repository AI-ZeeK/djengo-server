<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Questrial&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=mail"
    />
    <title>DJENGO | Verify Your E-Mail Address</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Questrial', sans-serif;
        font-weight: 600;
        font-style: normal;
      }
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
      }
      .container {
        margin: auto;
        background-color: #ffffff;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
      }
      .logo-block {
        height: 5rem;
        display: flex;
        gap: 4px;
        justify-content: center;
        align-items: center;
      }
      .logo-box {
        height: 4rem;
        width: 4rem;
        border-radius: 12px;
        overflow: hidden;
      }
      .logo-name {
        color: black;
        font-size: 2rem;
        font-family: 'Comfortaa', sans-serif;
        font-optical-sizing: auto;
        font-weight: 800;
        font-style: normal;
      }
      .header {
        background-color: #333;
        color: #ffffff;
        padding: 20px;
        border-radius: 8px 8px 0 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .header img {
        max-width: 120px;
        margin-bottom: 10px;
      }
      .otp-box {
        display: inline-block;
        font-size: 24px;
        font-weight: bold;
        color: #333;
        padding: 10px;
        border: 2px solid #333;
        border-radius: 5px;
        margin: 10px;
      }
      p {
        color: #555;
        font-size: 16px;
      }
      .footer {
        font-size: 12px;
        color: #777;
        margin-top: 20px;
      }
      .mail-section {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
      }
      .mail-section::before,
      .mail-section::after {
        content: '';
        flex: 1;
        height: 1px;
        background-color: #ccc;
        margin: 0 10px;
      }
      .main-body {
        display: flex;
        width: 100%;
        flex-direction: column;
        justify-content: start;
        align-items: start;
        padding: 24px;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="logo-block">
        <div class="logo-box">
          <img src="djengo-logo.png" class="" alt="Company Logo" />
        </div>
        <span class="logo-name"> Djengo </span>
      </section>
      <div class="header">
        <div class="mail-section">
          <span class="material-symbols-outlined">mail</span>
        </div>
        <h3>THANKS FOR SIGNING UP!</h3>
        <h1>Verify Your E-Mail Address</h1>
      </div>
      <div class="main-body">
        <p>Hello {{name}},</p>
        <p>Please use the following One Time Password (OTP):</p>
        <div class="otp-box">{{otp}}</div>
        <p>
          This passcode will only be valid for the next
          <strong>2 minutes</strong>.
        </p>
        <div class="footer">
          <p>Thank you for using our services!</p>
        </div>
      </div>
    </div>
  </body>
</html>
